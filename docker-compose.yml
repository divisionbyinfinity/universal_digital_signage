version: "3.9"
services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: always

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

    ports:
      - "${MONGO_PORT}:27017"

    volumes:
      - mongodb-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

    networks:
      - uds_network

    healthcheck:
      test: ["CMD-SHELL", "mongosh -u \"$MONGO_INITDB_ROOT_USERNAME\" -p \"$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 })' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    container_name: signage-backend
    restart: always

    depends_on:
      mongodb:
        condition: service_healthy

    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${BACKEND_PORT}
      DB_URL: ${DB_URL}
      CDN_URL: ${CDN_URL}
      CDN_PATH: ${CDN_PATH}
      TEMPLATE_PATH: ${TEMPLATE_PATH}
      JWT_SECRET: ${JWT_SECRET}

    volumes:
      - ${CDN_PATH}:${CDN_LOCAL_PATH}

    networks:
      - uds_network

    tmpfs:
      - /tmp

    security_opt:
      - no-new-privileges:true

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_URL: ${PUBLIC_URL}

    container_name: signage-frontend

    ports:
      - "${PORT_FRONTEND}:${PORT_FRONTEND}"

    volumes:
      - ${FRONTEND_OUTPUT_HOST_PATH}:${FRONTEND_OUTPUT_CONTAINER_PATH}

    environment:
      NODE_ENV: ${NODE_ENV}
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      REACT_APP_CDN_URL: ${REACT_APP_CDN_URL}

    command: >
      sh -c "cp -r ${FRONTEND_BUILD_CONTAINER_PATH}/* ${FRONTEND_OUTPUT_CONTAINER_PATH}/ &&
             if [ \"$NODE_ENV\" = \"local\" ]; then
                echo 'Starting local dev server...';
                npx serve -s ${FRONTEND_OUTPUT_CONTAINER_PATH} -l ${PORT_FRONTEND};
             else
                echo 'Production build copied. Exiting.';
             fi"

    networks:
      - uds_network

    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodb-data:

networks:
  uds_network:
    driver: bridge